      <div className="bg-slate-900 rounded-2xl p-5 border border-indigo-500">
        <h4 className="font-bold text-indigo-300 mb-3">¿Qué es una Vista de Usuario?</h4>
        <p className="text-slate-300 text-sm">
          Es un subconjunto de datos utilizado por un usuario para tomar una decisión o realizar una acción.
        </p>
      </div>

      <div className="bg-slate-900 rounded-2xl p-5 border border-indigo-500">
        <h4 className="font-bold text-indigo-300 mb-3">Ejemplos de vistas</h4>
        <p className="text-slate-300 text-sm">
          Documentos, formularios, reportes, carpetas, archivos, pantallas, llamadas telefónicas o contactos personales.
        </p>
      </div>
    </div>

    <div className="bg-indigo-900 bg-opacity-30 border border-indigo-500 rounded-2xl p-5 mt-4">
      <h4 className="font-bold text-indigo-200 mb-2">💡 Idea clave</h4>
      <p className="text-slate-300">
        Las vistas se obtienen revisando las tareas realizadas por los usuarios y los datos requeridos para llevarlas a cabo.
      </p>
    </div>
  </Card>

  <Card className="border-emerald-400">
    <h3 className="text-2xl font-bold text-emerald-200 mb-4">✏️ Convenciones CASE*METHOD de Oracle</h3>
    <p className="text-slate-300 leading-relaxed mb-5">
      El PDF menciona convenciones para representar entidades en el diagrama E/R usando CASE*METHOD de Oracle.
    </p>

    <div className="grid md:grid-cols-3 gap-4">
      <div className="bg-slate-900 rounded-2xl p-5 border border-emerald-500">
        <h4 className="font-bold text-emerald-300 mb-3">Forma</h4>
        <p className="text-slate-300 text-sm">Se utilizan cajas con bordes redondeados de cualquier tamaño.</p>
      </div>

      <div className="bg-slate-900 rounded-2xl p-5 border border-emerald-500">
        <h4 className="font-bold text-emerald-300 mb-3">Nombre único</h4>
        <p className="text-slate-300 text-sm">Cada entidad debe llevar un nombre único.</p>
      </div>

      <div className="bg-slate-900 rounded-2xl p-5 border border-emerald-500">
        <h4 className="font-bold text-emerald-300 mb-3">Mayúscula y singular</h4>
        <p className="text-slate-300 text-sm">El nombre se escribe en mayúscula y en singular.</p>
      </div>
    </div>

    <div data-audio-skip="true" className="svgbox mt-5">
      <svg viewBox="0 0 820 210" width="100%" height="210" role="img" aria-label="Ejemplo de entidades CASE METHOD">
        <rect x="70" y="55" width="190" height="90" rx="18" fill="#7dd3fc" stroke="#2563eb" strokeWidth="3"/>
        <text x="165" y="108" textAnchor="middle" fill="#1e3a8a" fontWeight="900" fontSize="20">ALUMNO</text>

        <rect x="315" y="55" width="190" height="90" rx="18" fill="#7dd3fc" stroke="#2563eb" strokeWidth="3"/>
        <text x="410" y="108" textAnchor="middle" fill="#1e3a8a" fontWeight="900" fontSize="20">NOTA</text>

        <rect x="560" y="55" width="190" height="90" rx="18" fill="#7dd3fc" stroke="#2563eb" strokeWidth="3"/>
        <text x="655" y="108" textAnchor="middle" fill="#1e3a8a" fontWeight="900" fontSize="20">PROFESOR</text>
      </svg>
    </div>
  </Card>

  <Card className="border-purple-400">
    <h3 className="text-2xl font-bold text-purple-200 mb-4">📚 Ejemplo guiado</h3>
    <p className="text-slate-300 leading-relaxed mb-4">
      Narrativa: “Cuando se contrata un empleado, se requiere saber su nombre, dirección y teléfono. Además, se le asigna un código que lo identifica.”
    </p>

    <div className="grid md:grid-cols-2 gap-4">
      <div className="bg-slate-900 rounded-2xl p-5 border border-purple-500">
        <h4 className="font-bold text-purple-300 mb-3">Entidad identificada</h4>
        <div className="bg-purple-900 bg-opacity-30 rounded-xl p-5 border border-purple-500 text-center text-2xl font-black">
          EMPLEADO
        </div>
      </div>

      <div className="bg-slate-900 rounded-2xl p-5 border border-purple-500">
        <h4 className="font-bold text-purple-300 mb-3">¿Por qué es entidad?</h4>
        <p className="text-slate-300 text-sm">
          Porque es importante para el negocio, se necesita guardar información sobre él y cada empleado puede identificarse mediante un código.
        </p>
      </div>
    </div>
  </Card>

  <Card className="border-yellow-400">
    <h3 className="text-2xl font-bold text-yellow-200 mb-4">⚠️ Lo que debes recordar para la prueba</h3>

    <div className="grid md:grid-cols-2 gap-4">
      <div className="bg-slate-900 rounded-2xl p-5 border border-yellow-500">
        <h4 className="font-bold text-yellow-300 mb-2">Entidad</h4>
        <p className="text-slate-300 text-sm">Objeto real o abstracto del que se desea guardar información.</p>
      </div>

      <div className="bg-slate-900 rounded-2xl p-5 border border-yellow-500">
        <h4 className="font-bold text-yellow-300 mb-2">Cómo detectarla</h4>
        <p className="text-slate-300 text-sm">Buscar sustantivos importantes en la narrativa del negocio.</p>
      </div>

      <div className="bg-slate-900 rounded-2xl p-5 border border-yellow-500">
        <h4 className="font-bold text-yellow-300 mb-2">Cómo nombrarla</h4>
        <p className="text-slate-300 text-sm">En mayúscula, singular y con nombre único.</p>
      </div>

      <div className="bg-slate-900 rounded-2xl p-5 border border-yellow-500">
        <h4 className="font-bold text-yellow-300 mb-2">Pregunta clave</h4>
        <p className="text-slate-300 text-sm">¿Necesito guardar información sobre esto?</p>
      </div>
    </div>
  </Card>

  <Card className="border-red-400">
    <h3 className="text-2xl font-bold text-red-200 mb-4">🚨 Pregunta típica de evaluación</h3>
    <p className="text-slate-300 mb-4">Según las convenciones CASE*METHOD, ¿cómo debe escribirse el nombre de una entidad?</p>
    <div className="space-y-3">
      <div className="bg-slate-900 rounded-xl p-4 border border-slate-600">A) En minúscula y plural.</div>
      <div className="bg-emerald-900 bg-opacity-40 rounded-xl p-4 border border-emerald-500">B) En mayúscula y singular.</div>
      <div className="bg-slate-900 rounded-xl p-4 border border-slate-600">C) Sin nombre, solo con un símbolo.</div>
    </div>
    <p className="text-emerald-200 mt-4 font-bold">✅ Respuesta correcta: B.</p>
  </Card>

</div>,
 atributos:<div className="space-y-5"><Card><h2 className="text-3xl font-black mb-3">📝 Atributos</h2><p className="text-slate-300">Un atributo es información que se necesita conocer y mantener de una entidad o relación. Tiene un dominio, es decir, un conjunto de valores posibles.</p></Card><div className="grid md:grid-cols-2 gap-4"><Card><h3 className="font-bold text-indigo-300">Simple</h3><p>Un solo componente. Ejemplo: edad.</p></Card><Card><h3 className="font-bold text-indigo-300">Compuesto</h3><p>Se divide en partes. Ejemplo: dirección: calle, número, comuna.</p></Card><Card><h3 className="font-bold text-indigo-300">Monovalorado</h3><p>Un valor por ocurrencia. Ejemplo: rut.</p></Card><Card><h3 className="font-bold text-indigo-300">Multivalorado</h3><p>Varios valores. Ejemplo: teléfonos de un cliente.</p></Card><Card><h3 className="font-bold text-indigo-300">Derivado</h3><p>Se calcula desde otros datos. Ejemplo: promedio final.</p></Card></div></div>,
 relaciones:<div className="space-y-5"><Card><h2 className="text-3xl font-black mb-3">🔗 Relaciones y cardinalidad</h2><p className="text-slate-300">Una relación conecta entidades. La cardinalidad indica cuántas ocurrencias pueden participar en esa relación.</p></Card><div className="grid md:grid-cols-3 gap-4"><Card><h3 className="text-xl font-bold text-emerald-300">1:1</h3><p>Una ocurrencia se relaciona con una ocurrencia.</p></Card><Card><h3 className="text-xl font-bold text-blue-300">1:M</h3><p>Una ocurrencia se relaciona con muchas.</p></Card><Card><h3 className="text-xl font-bold text-amber-300">M:M</h3><p>Muchas ocurrencias se relacionan con muchas.</p></Card></div><Card><h3 className="font-bold text-indigo-300 mb-3">Cómo leer</h3><p className="text-slate-300">Siempre lee en ambos sentidos: un cliente puede realizar muchas compras; una compra pertenece a un cliente. Esa lectura ayuda a definir la cardinalidad.</p></Card></div>,
 summary:<div className="space-y-4">{DATA.summaries.map((s,i)=><Card key={i}><h3 className="text-xl font-bold text-indigo-300 mb-3">{s[0]}</h3><ul className="space-y-2">{s[1].map((p,j)=><li key={j}>✅ {p}</li>)}</ul></Card>)}</div>,
 flashcards:<Card><h2 className="text-3xl font-black mb-4">🃏 Flashcards</h2><div onClick={()=>setFlashFlip(!flashFlip)} className="cursor-pointer bg-indigo-900 rounded-2xl p-8 min-h-[220px] flex flex-col items-center justify-center text-center border border-indigo-300"><p className="pill mb-4">{DATA.flashcards[flashIdx][0]}</p><h3 className="text-2xl font-black">{flashFlip?DATA.flashcards[flashIdx][2]:DATA.flashcards[flashIdx][1]}</h3><p className="text-indigo-200 mt-4">Haz clic para girar</p></div><div className="flex justify-between mt-4"><Button onClick={()=>{setFlashIdx((flashIdx-1+DATA.flashcards.length)%DATA.flashcards.length);setFlashFlip(false)}}>Anterior</Button><Button onClick={()=>{setFlashIdx((flashIdx+1)%DATA.flashcards.length);setFlashFlip(false)}}>Siguiente</Button></div></Card>,
 practice:<div className="space-y-4"><Card><h2 className="text-3xl font-black mb-2">📝 Repaso</h2><p className="text-slate-300">Preguntas con respuesta oculta para estudiar escribiendo a mano.</p></Card>{DATA.practice.map((p,i)=><Card key={i}><p className="pill mb-2">{p[0]}</p><h3 className="font-bold text-lg mb-3">{p[1]}</h3><Button onClick={()=>setPracticeOpen({...practiceOpen,[i]:!practiceOpen[i]})}>{practiceOpen[i]?'Ocultar respuesta':'Ver respuesta'}</Button>{practiceOpen[i]&&<p className="mt-3 text-emerald-200 bg-slate-900 rounded-xl p-3">{p[2]}</p>}</Card>)}</div>,
 reflect:<div className="space-y-4"><Card><h2 className="text-3xl font-black mb-2">🤔 Reflexiona</h2><p className="text-slate-300">Sirve para preparar preguntas de desarrollo.</p></Card>{DATA.reflect.map((p,i)=><Card key={i}><h3 className="font-bold text-lg mb-3">{p[0]}</h3><Button onClick={()=>setReflectOpen({...reflectOpen,[i]:!reflectOpen[i]})}>{reflectOpen[i]?'Ocultar guía':'Ver guía'}</Button>{reflectOpen[i]&&<p className="mt-3 text-indigo-100 bg-slate-900 rounded-xl p-3">{p[1]}</p>}</Card>)}</div>,
 gloss:<Card><h2 className="text-3xl font-black mb-4">📖 Glosario</h2><div className="grid md:grid-cols-2 gap-3">{DATA.glossary.map((g,i)=><div className="study-note" key={i}><b className="text-indigo-200">{g[0]}</b><p className="text-sm text-slate-300 mt-1">{g[1]}</p></div>)}</div></Card>,
 quiz:<Card><h2 className="text-3xl font-black mb-4">❓ Quiz</h2>{!finished?<div><p className="mb-3">Pregunta {qIdx+1} de {quiz.length} · Puntaje: {score}</p><h3 className="text-xl font-bold mb-4">{quiz[qIdx].q}</h3><div className="space-y-2">{quiz[qIdx].opts.map((o,i)=><button key={i} onClick={()=>!answered&&setSelected(i)} className={`choice w-full text-left p-4 rounded-xl border transition ${selected===i?'border-indigo-300 bg-indigo-900':'border-slate-600 bg-slate-700'} ${answered&&i===quiz[qIdx].a?'bg-emerald-700 border-emerald-300':''} ${answered&&selected===i&&i!==quiz[qIdx].a?'bg-rose-700 border-rose-300':''}`}>{o}</button>)}</div>{answered&&<p className="mt-4 bg-slate-900 p-3 rounded-xl">{quiz[qIdx].exp}</p>}<div className="mt-4 flex gap-2"><Button disabled={selected===null||answered} onClick={confirm}>Confirmar</Button><Button disabled={!answered} onClick={nextQ}>{qIdx+1<quiz.length?'Siguiente':'Terminar'}</Button></div></div>:<div className="text-center"><p className="text-4xl font-black text-emerald-300 mb-3">{score}/{quiz.length}</p><p className="mb-4">Mejor puntaje guardado: {stats.best}</p><Button onClick={resetQuiz}>Reiniciar quiz</Button>{wrong.length>0&&<div className="text-left mt-5"><h3 className="font-bold text-rose-300 mb-2">Incorrectas</h3>{wrong.map((w,i)=><p key={i} className="bg-slate-900 rounded-xl p-3 mb-2"><b>{w.pregunta}</b><br/>Correcta: {w.correcta}<br/>{w.exp}</p>)}</div>}</div>}</Card>,
 exam:<Card><h2 className="text-3xl font-black mb-4">📋 Examen</h2>{!examFinished?<div><p className="mb-3">Pregunta {examIdx+1} de {exam.length}</p><h3 className="text-xl font-bold mb-4">{exam[examIdx].q}</h3><div className="space-y-2">{exam[examIdx].opts.map((o,i)=><button key={i} onClick={()=>!examConfirmed&&setExamAnswers(Object.assign([...examAnswers],{[examIdx]:i}))} className={`w-full text-left p-4 rounded-xl border ${examAnswers[examIdx]===i?'border-indigo-300 bg-indigo-900':'border-slate-600 bg-slate-700'} ${examConfirmed&&i===exam[examIdx].a?'bg-emerald-700 border-emerald-300':''}`}>{o}</button>)}</div>{examConfirmed&&<p className="mt-4 bg-slate-900 p-3 rounded-xl">{exam[examIdx].exp}</p>}<div className="mt-4 flex gap-2"><Button disabled={examAnswers[examIdx]===undefined||examConfirmed} onClick={()=>setExamConfirmed(true)}>Confirmar</Button><Button disabled={!examConfirmed} onClick={nextExam}>{examIdx+1<exam.length?'Siguiente':'Finalizar'}</Button></div></div>:<div className="text-center"><p className="text-4xl font-black text-emerald-300 mb-3">{examScore()}/{exam.length}</p><p className="text-2xl mb-4">Nota aprox.: {nota(examScore(),exam.length)}</p><Button onClick={resetExam}>Nuevo examen</Button></div>}</Card>,
 games:<Card><h2 className="text-3xl font-black mb-4">🎮 Juegos</h2><div className="flex flex-wrap gap-2 mb-4">{Object.entries(DATA.games).map(([k,g])=><Button key={k} onClick={()=>{setActiveGame(k);setGameIdx(0);setGameFeedback(null)}} className={activeGame===k?'bg-emerald-600':''}>{g.title}</Button>)}</div><p className="mb-2">Puntaje: {gameScore}</p><h3 className="text-xl font-bold mb-4">{game.title}</h3><p className="bg-slate-900 rounded-xl p-4 mb-4">{item[0]}</p><div className="grid md:grid-cols-3 gap-2">{game.options.map(o=><button key={o} onClick={()=>answerGame(o)} className="bg-slate-700 hover:bg-indigo-700 rounded-xl p-4 font-bold">{o}</button>)}</div>{gameFeedback&&<div className={`mt-4 rounded-xl p-4 ${gameFeedback.ok?'bg-emerald-800':'bg-rose-800'}`}>{gameFeedback.text}<div className="mt-3"><Button onClick={()=>{setGameFeedback(null);setGameIdx(i=>i+1)}}>Siguiente</Button></div></div>}</Card>,
 stats:<Card><h2 className="text-3xl font-black mb-4">🏆 Progreso</h2><div className="grid md:grid-cols-3 gap-4"><div className="study-note"><b>Intentos quiz</b><p className="text-3xl font-black">{stats.attempts||0}</p></div><div className="study-note"><b>Mejor quiz</b><p className="text-3xl font-black">{stats.best||0}</p></div><div className="study-note"><b>Exámenes</b><p className="text-3xl font-black">{(stats.examHistory||[]).length}</p></div></div><Button className="mt-4 bg-rose-600" onClick={()=>saveStats({best:0,attempts:0,history:[],wrongAnswers:[],examHistory:[]})}>Borrar progreso</Button></Card>,
 badges:<Card><h2 className="text-3xl font-black mb-4">🏅 Logros</h2><div className="grid md:grid-cols-2 gap-3">{[{n:'Primer intento',a:(stats.attempts||0)>=1},{n:'Constancia',a:(stats.attempts||0)>=3},{n:'Casi perfecto',a:(stats.best||0)>=10},{n:'Dominio total',a:(stats.best||0)>=12},{n:'Practicante MER',a:true},{n:'Examen realizado',a:(stats.examHistory||[]).length>=1}].map((b,i)=><div key={i} className={`rounded-xl p-4 border ${b.a?'bg-emerald-800 border-emerald-300':'bg-slate-700 border-slate-500 opacity-70'}`}>{b.a?'🏅':'🔒'} <b>{b.n}</b></div>)}</div></Card>
 };
 return <div className="min-h-screen p-4 pb-12 font-sans" style={{background:'linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#312e81 100%)',color:'white'}}><div className="max-w-screen-2xl mx-auto main-layout"><main><div className="bg-slate-800 bg-opacity-80 rounded-3xl p-6 mb-6 border border-slate-700 shadow-xl"><h1 className="text-3xl md:text-4xl font-black mb-1">📊 Modelamiento de Bases de Datos</h1><p className="text-indigo-200">Guía interactiva · Unidad I · Semana 1 · Modelo Entidad-Relación</p></div><Menu/><div data-section-active="true">{content[tab]}</div></main><aside className="audio-sidebar"><div className="audio-panel"><div className="flex items-center justify-between mb-2"><b>🎙️ Audio</b><button data-noaudio="true" onClick={()=>setAudioClick(!audioClick)} className={`audio-btn ${audioClick?'audio-toggle-on':'audio-toggle-off'}`}>Audio clic: {audioClick?'ON':'OFF'}</button></div><select value={selectedVoice} onChange={e=>setSelectedVoice(e.target.value)}>{voiceList.length?voiceList.map(v=><option key={v.name} value={v.name}>{v.name}</option>):<option>Voz del navegador</option>}</select><div className="audio-speed"><div className="speed-header"><span>Velocidad</span><span>{audioRate.toFixed(2)}</span></div><input data-noaudio="true" className="speed-range" type="range" min="0.60" max="1.50" step="0.01" value={audioRate} onChange={e=>setAudioRate(Number(e.target.value))}/></div><div className="audio-grid"><button data-noaudio="true" className="audio-btn" onClick={()=>setAudioRate(r=>Math.max(.60,Number((r-.08).toFixed(2))))}>🐢 Más lento</button><button data-noaudio="true" className="audio-btn" onClick={()=>setAudioRate(r=>Math.min(1.50,Number((r+.08).toFixed(2))))}>🐇 Más rápido</button><button data-noaudio="true" className="audio-btn" onClick={leerSeleccion}>🔊 Leer selección</button><button data-noaudio="true" className="audio-btn" onClick={textSection}>📚 Leer sección</button><button data-noaudio="true" className="audio-btn audio-stop" onClick={detener}>⏹️ Detener</button></div></div></aside></div></div>
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
